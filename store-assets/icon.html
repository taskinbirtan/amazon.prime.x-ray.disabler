<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; }
  .icon {
    width: 128px;
    height: 128px;
    border-radius: 28px;
    background: linear-gradient(140deg, #00A8E1 0%, #0073BB 50%, #0F171E 110%);
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 168, 225, 0.35), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.18), transparent 60%);
  }
  .glyph {
    width: 78px;
    height: 78px;
    position: relative;
    z-index: 2;
  }
  .glyph svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .accent-bar {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 4px;
    background: #FF9900;
    border-radius: 2px;
    z-index: 3;
    box-shadow: 0 0 12px rgba(255, 153, 0, 0.6);
  }
</style>
</head>
<body>
<div class="icon">
  <div class="glyph">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- eye outline -->
      <path d="M10 50 Q 50 14, 90 50 Q 50 86, 10 50 Z"
            fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
      <!-- pupil -->
      <circle cx="50" cy="50" r="14" fill="none" stroke="white" stroke-width="6"/>
      <circle cx="50" cy="50" r="5" fill="white"/>
      <!-- diagonal slash -->
      <line x1="14" y1="86" x2="86" y2="14"
            stroke="#FF9900" stroke-width="9" stroke-linecap="round"/>
      <line x1="14" y1="86" x2="86" y2="14"
            stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
</div>
</body>
</html>
