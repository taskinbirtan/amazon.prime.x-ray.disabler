<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  html, body { background: transparent; }

  .tile {
    width: 440px;
    height: 280px;
    background:
      radial-gradient(ellipse at 85% 15%, rgba(0, 168, 225, 0.28), transparent 55%),
      radial-gradient(ellipse at 15% 90%, rgba(255, 153, 0, 0.18), transparent 55%),
      linear-gradient(160deg, #0F171E 0%, #1A242F 100%);
    border-radius: 16px;
    padding: 32px;
    display: flex;
    align-items: center;
    gap: 26px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 24px 24px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  .icon-block {
    width: 96px;
    height: 96px;
    border-radius: 22px;
    background: linear-gradient(140deg, #00A8E1 0%, #0073BB 100%);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    box-shadow: 0 8px 24px rgba(0, 168, 225, 0.4), inset 0 1px 0 rgba(255,255,255,0.18);
  }

  .icon-block svg { width: 60px; height: 60px; }

  .text {
    position: relative;
    z-index: 2;
    flex: 1;
  }

  .badge {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(255, 153, 0, 0.15);
    border: 1px solid rgba(255, 153, 0, 0.4);
    color: #FFB84D;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 4px;
    margin-bottom: 12px;
  }

  h1 {
    color: white;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  h1 .accent {
    background: linear-gradient(90deg, #00A8E1, #5FD4F5);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    color: #B8C5D3;
    font-size: 13px;
    line-height: 1.4;
    font-weight: 400;
  }

  .corner-tag {
    position: absolute;
    top: 18px;
    right: 18px;
    font-size: 10px;
    font-weight: 600;
    color: #FF9900;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="tile">
  <div class="icon-block">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 50 Q 50 14, 90 50 Q 50 86, 10 50 Z" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
      <circle cx="50" cy="50" r="14" fill="none" stroke="white" stroke-width="6"/>
      <circle cx="50" cy="50" r="5" fill="white"/>
      <line x1="14" y1="86" x2="86" y2="14" stroke="#FF9900" stroke-width="9" stroke-linecap="round"/>
      <line x1="14" y1="86" x2="86" y2="14" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="text">
    <span class="badge">For Prime Video</span>
    <h1>Hide <span class="accent">X-Ray</span><br>Spoilers</h1>
    <p>One click to disable the X-Ray panel and pop-ups.</p>
  </div>
  <div class="corner-tag">v1.3</div>
</div>
</body>
</html>
